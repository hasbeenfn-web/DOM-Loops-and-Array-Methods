<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 2</title>
</head>
<body>
    <h2>sum of numbers from 1 to N</h2>

    <input type="text" id="num" placeholder="Enter N">
    <button onclick ="findsum()">Find Sum</button>
    <script>
        function findsum(){
          let n = Number(document.getElementById("num").value);
          let sum = 0;

          for(let i=1; i<=n; i++) {
            sum =sum + i; 
          }
           alert("Sum from 1 to " + n + " is " + sum);
       
        }
    </script>
</body>
</html>
