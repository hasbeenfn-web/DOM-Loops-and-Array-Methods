<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>task 3</title>
  </head>
  <body>
    <h2>Greatest of 3 Numbers</h2>
    <label>Number 1:</label>
    <input type="text" id="n1" /><br /><br />
    <label>Number 2:</label>
    <input type="text" id="n2" /><br /><br />
    <label>Number 3:</label>
    <input type="text" id="n3" /><br /><br />

    <button onclick="checkGreatest()">checkGreatest</button>

    <script>
      function checkGreatest() {
        let a = Number(document.getElementById("n1").value);
        let b = Number(document.getElementById("n2").value);
        let c = Number(document.getElementById("n3").value);

        let greatest;

        if (a >= b && a >= c) {
          greatest = a;
        } else if (b >= a && b >= c) {
          greatest = b;
        } else {
          greatest = c;
        }
        alert("Greatest number is: " + greatest);
      }
    </script>
  </body>
</html>
